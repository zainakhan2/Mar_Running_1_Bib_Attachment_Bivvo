function doSearch(){
  var q=document.getElementById('q').value.toLowerCase().trim();
  var filtered=pages.filter(function(p){
    if(activeCat!=='all'&&p.c!==activeCat) return false;
    if(!q) return true;
    return (p.t+' '+p.d+' '+p.c).toLowerCase().indexOf(q)>=0;
  });
  var html='<div class="count">'+filtered.length+' results'+(q?' for "'+q+'"':'')+'</div>';
  filtered.forEach(function(p){
    var desc=p.d;
    if(q){desc=desc.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="match">$1</span>');}
    html+='<a href="'+p.u+'" class="result"><span class="cat">'+p.c+'</span><h4>'+p.t+'</h4><div class="desc">'+desc+'</div></a>';
  });
  document.getElementById('results').innerHTML=html;
}
function filterCat(c,btn){
  activeCat=c;
  document.querySelectorAll('.cats button').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  doSearch();
}
